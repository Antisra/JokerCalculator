<!DOCTYPE html>
<html lang="en">
  <head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="x-UA-Compatible" content="ie=edge">
    <title>Calculator</title>
   <link rel="stylesheet" href="index.css">
  </head>
  
  <body>
    
    <div id="calculator">
    
<h1>Welcome to Calculator with jk, not just js.</h1>

      <input id="display" readonly>
      
      <div id="keys"> 
        <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
           <button onclick="appendToDisplay('7')">7</button>
         <button onclick="appendToDisplay('8')">8</button>
         <button onclick="appendToDisplay('9')">9</button>
         <button onclick="appendToDisplay('&divide;')" class="operator-btn">&divide;</button>
         <button onclick="appendToDisplay('4')">4</button>
         <button onclick="appendToDisplay('5')">5</button>
         <button onclick="appendToDisplay('6')">6</button>
         <button onclick="appendToDisplay('&times;')" class="operator-btn">&times;</button>
         <button onclick="appendToDisplay('1')">1</button>
         <button onclick="appendToDisplay('2')">2</button>
         <button onclick="appendToDisplay('3')">3</button>
         <button onclick="appendToDisplay('&minus;')" class="operator-btn">&minus;</button>
           <button onclick="appendToDisplay('0')">0</button>
           <button onclick="appendToDisplay('.')">.</button>
           <button onclick="calculate()">=</button>
        <button onclick="clearDisplay" class="operator-btn">CE</button>
      </div>
   
    </div>

       <script src="index.js"></script>
    
  </body>
  
</html>
